<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gol Sejahtera - Mini Football Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #070d07;
            --fg: #e8f5e0;
            --muted: #5a7a5a;
            --accent: #00e676;
            --card: rgba(15,30,15,0.85);
            --border: rgba(0,230,118,0.25);
            --gold: #ffd740;
            --danger: #ff5252;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Source Sans 3', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        /* Latar belakang atmosferik */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% 30%, rgba(0,230,118,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 30% 70%, rgba(0,100,50,0.05) 0%, transparent 60%),
                radial-gradient(ellipse 50% 30% at 80% 60%, rgba(255,215,64,0.03) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        h1, h2, h3 { font-family: 'Oswald', sans-serif; }
        .game-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 640px;
            padding: 0 12px;
        }
        canvas {
            display: block;
            width: 100%;
            border-radius: 12px;
            box-shadow:
                0 0 40px rgba(0,230,118,0.15),
                0 8px 32px rgba(0,0,0,0.6);
            cursor: crosshair;
        }
        /* HUD */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            margin-bottom: 8px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            backdrop-filter: blur(8px);
        }
        .hud-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
        }
        .hud-item .label { color: var(--muted); font-weight:400; font-size:0.85rem; }
        .hud-item .value { color: var(--gold); font-size:1.3rem; }
        .hud-item .value.lives { color: var(--danger); letter-spacing: 3px; }
        .streak-badge {
            background: linear-gradient(135deg, var(--gold), #ff8f00);
            color: #1a1a00;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            display: none;
            animation: pulse 0.6s ease infinite alternate;
        }
        .streak-badge.show { display: inline-block; }
        @keyframes pulse { from{transform:scale(1)} to{transform:scale(1.08)} }

        /* Overlay screens */
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(5,12,5,0.92);
            backdrop-filter: blur(6px);
            border-radius: 12px;
            z-index: 10;
            transition: opacity 0.4s;
        }
        .overlay.hidden { opacity:0; pointer-events:none; }
        .overlay h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--accent), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }
        .overlay h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 8px;
        }
        .overlay p {
            color: var(--muted);
            font-size: 1rem;
            max-width: 340px;
            text-align: center;
            line-height: 1.6;
        }
        .btn-play {
            margin-top: 24px;
            padding: 14px 48px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #0a1a0a;
            background: linear-gradient(135deg, var(--accent), #69f0ae);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(0,230,118,0.3);
        }
        .btn-play:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 6px 28px rgba(0,230,118,0.45); }
        .btn-play:active { transform: scale(0.97); }
        .stat-row {
            display: flex;
            justify-content: space-between;
            width: 220px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            font-size: 1rem;
        }
        .stat-row .stat-label { color: var(--muted); }
        .stat-row .stat-val { color: var(--fg); font-weight: 600; font-family:'Oswald',sans-serif; }
        .instruction {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            font-size: 0.9rem;
            color: var(--muted);
        }
        .instruction i { color: var(--accent); width: 20px; text-align: center; }
        .goal-anim {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .goal-anim.show { opacity: 1; }
        .goal-anim h2 {
            font-size: 4rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(255,215,64,0.6), 0 0 60px rgba(255,215,64,0.3);
            animation: goalBounce 0.5s ease;
        }
        @keyframes goalBounce {
            0%{transform:scale(0.3) rotate(-10deg);opacity:0}
            50%{transform:scale(1.2) rotate(3deg);opacity:1}
            100%{transform:scale(1) rotate(0deg);opacity:1}
        }
        .save-anim h2 {
            color: var(--danger) !important;
            text-shadow: 0 0 30px rgba(255,82,82,0.5) !important;
        }
        @media (max-width: 500px) {
            .overlay h1 { font-size: 2.2rem; }
            .overlay h2 { font-size: 1.5rem; }
            .hud-item .value { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="game-wrapper" id="gameWrapper">
        <!-- HUD -->
        <div class="hud" id="hud" style="opacity:0; transition:opacity 0.3s;">
            <div class="hud-item">
                <span class="label">SKOR</span>
                <span class="value" id="hudScore">0</span>
            </div>
            <div class="hud-item">
                <span class="streak-badge" id="streakBadge">STREAK x0</span>
            </div>
            <div class="hud-item">
                <span class="label">BABAK</span>
                <span class="value" id="hudRound">1</span>
            </div>
            <div class="hud-item">
                <span class="label">NYAWA</span>
                <span class="value lives" id="hudLives"></span>
            </div>
        </div>

        <!-- Canvas container -->
        <div style="position:relative;">
            <canvas id="gameCanvas" width="600" height="400"></canvas>

            <!-- Gol / Save anim -->
            <div class="goal-anim" id="goalAnim"><h2>GOOOL!</h2></div>
            <div class="goal-anim save-anim" id="saveAnim"><h2>SAVE!</h2></div>

            <!-- Menu overlay -->
            <div class="overlay" id="menuOverlay">
                <h1>GOL SEJAHTERA</h1>
                <p style="margin-top:8px; color:var(--accent); font-family:'Oswald'; font-size:1.1rem; letter-spacing:2px;">PENALTY SHOOTOUT</p>
                <div style="margin-top:20px;">
                    <div class="instruction"><i class="fas fa-arrows-left-right"></i> Gerakkan mouse untuk arah tendangan</div>
                    <div class="instruction"><i class="fas fa-hand-pointer"></i> Klik & tahan untuk mengisi daya</div>
                    <div class="instruction"><i class="fas fa-futbol"></i> Lepaskan untuk menendang!</div>
                </div>
                <button class="btn-play" id="btnStart">MULAI MAIN</button>
            </div>

            <!-- Game Over overlay -->
            <div class="overlay hidden" id="gameOverOverlay">
                <h2>PERTANDINGAN SELESAI</h2>
                <div id="finalStats" style="margin:12px 0;"></div>
                <button class="btn-play" id="btnRestart">MAIN LAGI</button>
            </div>
        </div>
    </div>

    <script>
    // ========== KONFIGURASI GAME ==========
    const CFG = {
        canvasW: 600,
        canvasH: 400,
        goalX: 120, goalY: 55,
        goalW: 360, goalH: 130,
        ballStartX: 300, ballStartY: 355,
        ballR: 11,
        keeperW: 60, keeperH: 85,
        keeperBaseX: 300, keeperBaseY: 108,
        maxPower: 100,
        powerSpeed: 1.8,      // kecepatan pengisian power bar
        shotSpeed: 9,         // kecepatan bola terbang
        keeperSpeed: 4.5,     // kecepatan kiper bergerak
        maxLives: 5,
        maxRounds: 10,
        // Zona dalam gawang (grid 3x3)
        zones: [
            {id:0, cx:200, cy:85,  label:'Kiri Atas'},
            {id:1, cx:300, cy:80,  label:'Tengah Atas'},
            {id:2, cx:400, cy:85,  label:'Kanan Atas'},
            {id:3, cx:195, cy:135, label:'Kiri Bawah'},
            {id:4, cx:300, cy:135, label:'Tengah Bawah'},
            {id:5, cx:405, cy:135, label:'Kanan Bawah'},
        ]
    };

    // ========== AUDIO (Web Audio API) ==========
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if(!audioCtx) audioCtx = new AudioCtx(); }

    function playSound(type) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const t = audioCtx.currentTime;
        if(type==='kick') {
            osc.type='triangle'; osc.frequency.setValueAtTime(180,t);
            osc.frequency.exponentialRampToValueAtTime(40,t+0.15);
            gain.gain.setValueAtTime(0.35,t);
            gain.gain.exponentialRampToValueAtTime(0.001,t+0.2);
            osc.start(t); osc.stop(t+0.2);
        } else if(type==='goal') {
            osc.type='square'; osc.frequency.setValueAtTime(520,t);
            osc.frequency.setValueAtTime(660,t+0.1);
            osc.frequency.setValueAtTime(784,t+0.2);
            gain.gain.setValueAtTime(0.2,t);
            gain.gain.exponentialRampToValueAtTime(0.001,t+0.5);
            osc.start(t); osc.stop(t+0.5);
        } else if(type==='save') {
            osc.type='sawtooth'; osc.frequency.setValueAtTime(200,t);
            osc.frequency.exponentialRampToValueAtTime(80,t+0.3);
            gain.gain.setValueAtTime(0.15,t);
            gain.gain.exponentialRampToValueAtTime(0.001,t+0.35);
            osc.start(t); osc.stop(t+0.35);
        } else if(type==='miss') {
            osc.type='sine'; osc.frequency.setValueAtTime(300,t);
            osc.frequency.exponentialRampToValueAtTime(100,t+0.4);
            gain.gain.setValueAtTime(0.12,t);
            gain.gain.exponentialRampToValueAtTime(0.001,t+0.45);
            osc.start(t); osc.stop(t+0.45);
        } else if(type==='whistle') {
            osc.type='sine'; osc.frequency.setValueAtTime(900,t);
            osc.frequency.setValueAtTime(1100,t+0.15);
            osc.frequency.setValueAtTime(900,t+0.3);
            gain.gain.setValueAtTime(0.15,t);
            gain.gain.exponentialRampToValueAtTime(0.001,t+0.5);
            osc.start(t); osc.stop(t+0.5);
        }
    }

    // ========== ELEMEN DOM ==========
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const menuOverlay = document.getElementById('menuOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const goalAnim = document.getElementById('goalAnim');
    const saveAnim = document.getElementById('saveAnim');
    const hud = document.getElementById('hud');
    const hudScore = document.getElementById('hudScore');
    const hudRound = document.getElementById('hudRound');
    const hudLives = document.getElementById('hudLives');
    const streakBadge = document.getElementById('streakBadge');
    const finalStats = document.getElementById('finalStats');

    // ========== STATE GAME ==========
    let state = 'MENU'; // MENU, AIMING, CHARGING, SHOOTING, RESULT, GAMEOVER
    let score = 0;
    let lives = CFG.maxLives;
    let round = 1;
    let streak = 0;
    let bestStreak = 0;
    let totalShots = 0;
    let totalGoals = 0;

    // Bola
    let ball = { x: CFG.ballStartX, y: CFG.ballStartY, r: CFG.ballR, vx:0, vy:0, scale:1 };
    // Kiper
    let keeper = { x: CFG.keeperBaseX, y: CFG.keeperBaseY, targetX: CFG.keeperBaseX, diveDir:0, diving:false, diveProgress:0 };
    // Power
    let power = 0;
    let powerDir = 1;
    // Arah (mouse)
    let aimX = 300;
    let aimY = 120;
    // Target zona
    let targetZone = 4; // default tengah bawah
    // Partikel
    let particles = [];
    // Jejak bola
    let trail = [];
    // Result timer
    let resultTimer = 0;
    let resultType = ''; // 'goal', 'save', 'miss'
    // Animasi bola menghilang
    let ballAlpha = 1;

    // ========== UTILITAS ==========
    function dist(x1,y1,x2,y2) { return Math.sqrt((x2-x1)**2+(y2-y1)**2); }
    function lerp(a,b,t) { return a+(b-a)*t; }
    function clamp(v,lo,hi) { return Math.max(lo,Math.min(hi,v)); }
    function rand(a,b) { return a+Math.random()*(b-a); }

    // Tentukan zona berdasarkan posisi mouse di gawang
    function getZoneFromPos(mx, my) {
        // mx, my sudah dalam koordinat canvas
        const gx = CFG.goalX, gy = CFG.goalY, gw = CFG.goalW, gh = CFG.goalH;
        if(mx < gx || mx > gx+gw || my < gy || my > gy+gh) return -1; // di luar gawang
        const col = mx < gx+gw*0.33 ? 0 : mx < gx+gw*0.67 ? 1 : 2;
        const row = my < gy+gh*0.5 ? 0 : 1;
        return row * 3 + col;
    }

    // AI kiper memilih zona
    function keeperChooseZone() {
        // Kesulitan meningkat per round
        const r = Math.min(round, CFG.maxRounds);
        const smartChance = 0.25 + r * 0.06; // 31%..85%
        if(Math.random() < smartChance) {
            // Kiper "membaca" zona pemain
            return targetZone;
        }
        // Zona acak
        return Math.floor(Math.random()*6);
    }

    // ========== PARTIKEL ==========
    function spawnParticles(x, y, count, color1, color2, speed, life) {
        for(let i=0; i<count; i++) {
            const angle = Math.random()*Math.PI*2;
            const spd = rand(speed*0.3, speed);
            particles.push({
                x, y,
                vx: Math.cos(angle)*spd,
                vy: Math.sin(angle)*spd - rand(0,2),
                life: rand(life*0.5, life),
                maxLife: life,
                r: rand(2,6),
                color: Math.random()>0.5 ? color1 : color2,
                gravity: 0.08
            });
        }
    }

    function updateParticles() {
        for(let i=particles.length-1; i>=0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += p.gravity;
            p.life -= 1;
            if(p.life<=0) particles.splice(i,1);
        }
    }

    function drawParticles() {
        for(const p of particles) {
            const alpha = clamp(p.life/p.maxLife, 0, 1);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(0.5, p.r * alpha), 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    // ========== RENDER LAPANGAN ==========
    function drawField() {
        // Rumput
        const grassGrad = ctx.createLinearGradient(0,0,0,CFG.canvasH);
        grassGrad.addColorStop(0, '#1a5c1a');
        grassGrad.addColorStop(0.5, '#1e6b1e');
        grassGrad.addColorStop(1, '#145014');
        ctx.fillStyle = grassGrad;
        ctx.fillRect(0,0,CFG.canvasW,CFG.canvasH);

        // Garis rumput stripe
        ctx.globalAlpha = 0.08;
        for(let i=0; i<20; i++) {
            if(i%2===0) {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(i*30, 0, 30, CFG.canvasH);
            }
        }
        ctx.globalAlpha = 1;

        // Garis lapangan
        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.lineWidth = 2;
        // Kotak penalti
        ctx.strokeRect(100, 30, 400, 200);
        // Garis gawang
        ctx.beginPath();
        ctx.moveTo(CFG.goalX, CFG.goalY+CFG.goalH);
        ctx.lineTo(CFG.goalX+CFG.goalW, CFG.goalY+CFG.goalH);
        ctx.stroke();
        // Titik penalti
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.arc(300, 310, 3, 0, Math.PI*2);
        ctx.fill();
        // Setengah lingkaran
        ctx.beginPath();
        ctx.arc(300, 230, 60, 0, Math.PI);
        ctx.stroke();
    }

    // ========== RENDER GAWANG ==========
    function drawGoal() {
        const gx=CFG.goalX, gy=CFG.goalY, gw=CFG.goalW, gh=CFG.goalH;
        // Jaring (belakang)
        ctx.fillStyle = 'rgba(200,200,200,0.06)';
        ctx.fillRect(gx+5, gy+5, gw-10, gh-5);
        // Garis jaring
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 0.5;
        for(let i=gx+15; i<gx+gw; i+=15) {
            ctx.beginPath(); ctx.moveTo(i,gy); ctx.lineTo(i,gy+gh); ctx.stroke();
        }
        for(let j=gy+15; j<gy+gh; j+=15) {
            ctx.beginPath(); ctx.moveTo(gx,j); ctx.lineTo(gx+gw,j); ctx.stroke();
        }

        // Tiang gawang
        ctx.lineWidth = 6;
        ctx.strokeStyle = '#ffffff';
        ctx.shadowColor = 'rgba(255,255,255,0.3)';
        ctx.shadowBlur = 8;
        // Tiang kiri
        ctx.beginPath(); ctx.moveTo(gx,gy+gh); ctx.lineTo(gx,gy); ctx.stroke();
        // Tiang kanan
        ctx.beginPath(); ctx.moveTo(gx+gw,gy+gh); ctx.lineTo(gx+gw,gy); ctx.stroke();
        // Palang atas
        ctx.beginPath(); ctx.moveTo(gx,gy); ctx.lineTo(gx+gw,gy); ctx.stroke();
        ctx.shadowBlur = 0;

        // Bayangan gawang
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.moveTo(gx+gw, gy);
        ctx.lineTo(gx+gw+12, gy+10);
        ctx.lineTo(gx+gw+12, gy+gh+5);
        ctx.lineTo(gx+gw, gy+gh);
        ctx.fill();
    }

    // ========== RENDER KIPER ==========
    function drawKeeper() {
        const k = keeper;
        ctx.save();
        ctx.translate(k.x, k.y);

        // Efek menyelam
        let diveOffsetX = 0;
        let diveRotation = 0;
        let armSpread = 0;
        if(k.diving) {
            diveOffsetX = k.diveDir * k.diveProgress * 70;
            diveRotation = k.diveDir * k.diveProgress * 0.6;
            armSpread = k.diveProgress * 40;
            ctx.translate(diveOffsetX, -k.diveProgress*15);
            ctx.rotate(diveRotation);
        }

        // Bayangan
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.ellipse(0, 42, 22, 6, 0, 0, Math.PI*2);
        ctx.fill();

        // Badan (kaos kuning)
        ctx.fillStyle = '#ffd740';
        ctx.beginPath();
        ctx.roundRect(-18, -20, 36, 42, 4);
        ctx.fill();
        // Nomor
        ctx.fillStyle = '#1a1a00';
        ctx.font = 'bold 14px Oswald';
        ctx.textAlign = 'center';
        ctx.fillText('1', 0, 6);

        // Celana
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(-16, 20, 32, 16);

        // Kaki
        ctx.fillStyle = '#ffd740';
        ctx.fillRect(-14, 36, 10, 8);
        ctx.fillRect(4, 36, 10, 8);

        // Tangan
        ctx.fillStyle = '#ffc107';
        // Tangan kiri
        ctx.save();
        ctx.translate(-20, -10);
        ctx.rotate(-0.3 - armSpread*0.02);
        ctx.fillRect(-5-armSpread*0.5, -3, 10+armSpread*0.5, 6);
        // Sarung tangan
        ctx.fillStyle = '#00e676';
        ctx.fillRect(-8-armSpread*0.5, -4, 6, 8);
        ctx.restore();
        // Tangan kanan
        ctx.save();
        ctx.translate(20, -10);
        ctx.rotate(0.3 + armSpread*0.02);
        ctx.fillRect(-5, -3, 10+armSpread*0.5, 6);
        ctx.fillStyle = '#00e676';
        ctx.fillRect(2, -4, 6, 8);
        ctx.restore();

        // Kepala
        ctx.fillStyle = '#e8b87a';
        ctx.beginPath();
        ctx.arc(0, -28, 11, 0, Math.PI*2);
        ctx.fill();
        // Rambut
        ctx.fillStyle = '#3a2010';
        ctx.beginPath();
        ctx.arc(0, -33, 10, Math.PI, 0);
        ctx.fill();

        ctx.restore();
    }

    // ========== RENDER BOLA ==========
    function drawBall() {
        if(ballAlpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = ballAlpha;
        ctx.translate(ball.x, ball.y);
        ctx.scale(ball.scale, ball.scale);

        // Bayangan
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath();
        ctx.ellipse(2, ball.r+3, ball.r*0.8, 3, 0, 0, Math.PI*2);
        ctx.fill();

        // Bola
        const ballGrad = ctx.createRadialGradient(-3,-3,1, 0,0,ball.r);
        ballGrad.addColorStop(0, '#ffffff');
        ballGrad.addColorStop(0.7, '#e0e0e0');
        ballGrad.addColorStop(1, '#b0b0b0');
        ctx.fillStyle = ballGrad;
        ctx.beginPath();
        ctx.arc(0,0,ball.r,0,Math.PI*2);
        ctx.fill();

        // Pola segitiga bola
        ctx.fillStyle = 'rgba(30,30,30,0.6)';
        const angles = [0, 1.26, 2.51, 3.77, 5.03];
        for(const a of angles) {
            const px = Math.cos(a)*ball.r*0.55;
            const py = Math.sin(a)*ball.r*0.55;
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(px+Math.cos(a-0.5)*4, py+Math.sin(a-0.5)*4);
            ctx.lineTo(px+Math.cos(a+0.5)*4, py+Math.sin(a+0.5)*4);
            ctx.fill();
        }

        ctx.restore();
    }

    // ========== RENDER TRAIL BOLA ==========
    function drawTrail() {
        for(let i=0; i<trail.length; i++) {
            const t = trail[i];
            const alpha = (i/trail.length) * 0.3;
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.beginPath();
            ctx.arc(t.x, t.y, ball.r * (i/trail.length) * 0.6, 0, Math.PI*2);
            ctx.fill();
        }
    }

    // ========== RENDER AIM CURSOR ==========
    function drawAimCursor() {
        if(state !== 'AIMING' && state !== 'CHARGING') return;
        // Garis dari bola ke target
        ctx.setLineDash([6,4]);
        ctx.strokeStyle = 'rgba(0,230,118,0.3)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(ball.x, ball.y);
        ctx.lineTo(aimX, aimY);
        ctx.stroke();
        ctx.setLineDash([]);

        // Lingkaran target
        const pulse = Math.sin(Date.now()*0.005)*3;
        ctx.strokeStyle = 'rgba(0,230,118,0.6)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(aimX, aimY, 14+pulse, 0, Math.PI*2);
        ctx.stroke();
        // Titik tengah
        ctx.fillStyle = 'rgba(0,230,118,0.8)';
        ctx.beginPath();
        ctx.arc(aimX, aimY, 3, 0, Math.PI*2);
        ctx.fill();

        // Label zona
        const zone = getZoneFromPos(aimX, aimY);
        if(zone >= 0) {
            ctx.fillStyle = 'rgba(0,230,118,0.7)';
            ctx.font = '12px Oswald';
            ctx.textAlign = 'center';
            ctx.fillText(CFG.zones[zone].label, aimX, aimY - 22);
        }
    }

    // ========== RENDER POWER BAR ==========
    function drawPowerBar() {
        if(state !== 'CHARGING') return;
        const barX = 540, barY = 60, barW = 20, barH = 280;

        // Background
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath();
        ctx.roundRect(barX-4, barY-4, barW+8, barH+8, 6);
        ctx.fill();

        // Border
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(barX, barY, barW, barH, 4);
        ctx.stroke();

        // Isi power
        const fillH = (power/CFG.maxPower) * barH;
        const powerGrad = ctx.createLinearGradient(barX, barY+barH, barX, barY);
        powerGrad.addColorStop(0, '#00e676');
        powerGrad.addColorStop(0.5, '#ffd740');
        powerGrad.addColorStop(0.85, '#ff6e40');
        powerGrad.addColorStop(1, '#ff1744');
        ctx.fillStyle = powerGrad;
        ctx.beginPath();
        ctx.roundRect(barX+2, barY+barH-fillH+2, barW-4, fillH-4, 2);
        ctx.fill();

        // Indikator level
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 11px Oswald';
        ctx.textAlign = 'center';
        const pct = Math.round(power);
        ctx.fillText(pct+'%', barX+barW/2, barY+barH-fillH-8);

        // Zona optimal (60-85%)
        const optLow = barY + barH - (85/100)*barH;
        const optHigh = barY + barH - (60/100)*barH;
        ctx.strokeStyle = 'rgba(0,230,118,0.5)';
        ctx.lineWidth = 1;
        ctx.setLineDash([3,3]);
        ctx.strokeRect(barX-2, optLow, barW+4, optHigh-optLow);
        ctx.setLineDash([]);
    }

    // ========== RENDER INFORMASI ROUND ==========
    function drawRoundInfo() {
        if(state === 'SHOOTING' || state === 'RESULT') return;
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.font = '14px Oswald';
        ctx.textAlign = 'left';
        ctx.fillText('Tendangan ' + round + '/' + CFG.maxRounds, 15, 390);

        if(state === 'AIMING') {
            ctx.fillStyle = 'rgba(0,230,118,0.6)';
            ctx.font = '13px Source Sans 3';
            ctx.fillText('Arahkan ke gawang & klik tahan', 15, 25);
        } else if(state === 'CHARGING') {
            ctx.fillStyle = 'rgba(255,215,64,0.7)';
            ctx.font = '13px Source Sans 3';
            ctx.fillText('Lepaskan untuk menendang!', 15, 25);
        }
    }

    // ========== LOGIC: TENDANGAN ==========
    function shoot() {
        const zone = getZoneFromPos(aimX, aimY);
        targetZone = zone;

        // Hitung power efektivitas
        let powerFactor = 1;
        if(power < 20) {
            // Terlalu lemah, bola mudah ditangkap
            powerFactor = 0.3;
        } else if(power < 40) {
            powerFactor = 0.6;
        } else if(power <= 85) {
            // Zona optimal
            powerFactor = 1;
        } else if(power <= 95) {
            powerFactor = 0.85;
        } else {
            // Terlalu kuat, bola melesat
            powerFactor = 0.5;
        }

        // Tentukan apakah gol
        const keeperZone = keeperChooseZone();
        let isGoal = false;
        let isMiss = false;

        if(zone < 0) {
            // Di luar gawang = meleset
            isMiss = true;
        } else if(zone === keeperZone && powerFactor < 0.9) {
            // Kiper tepat di zona & power tidak maksimal = save
            isGoal = false;
        } else if(zone === keeperZone && powerFactor >= 0.9) {
            // Kiper di zona tapi tendangan kuat = tetap gol chance
            isGoal = Math.random() < 0.4;
        } else {
            // Kiper tidak di zona = gol (tapi bisa meleset kalau power terlalu kuat)
            isGoal = powerFactor > 0.4;
            if(power > 95 && Math.random() < 0.6) isMiss = true;
        }

        // Hitung target bola akhir
        let endX, endY;
        if(isMiss) {
            // Bola meleset di luar gawang
            endX = aimX + rand(-40, 40);
            endY = CFG.goalY - rand(10, 40);
            isGoal = false;
        } else if(isGoal) {
            const z = CFG.zones[zone];
            endX = z.cx + rand(-15, 15);
            endY = z.cy + rand(-10, 10);
        } else {
            // Save - bola menuju zona kiper
            endX = CFG.zones[keeperZone].cx + rand(-10, 10);
            endY = CFG.zones[keeperZone].cy + rand(-5, 5);
        }

        // Set bola velocity
        const dx = endX - ball.x;
        const dy = endY - ball.y;
        const d = Math.max(1, dist(ball.x, ball.y, endX, endY));
        const speed = CFG.shotSpeed;
        ball.vx = (dx/d) * speed;
        ball.vy = (dy/d) * speed;

        // Set kiper dive
        if(!isMiss) {
            const kZone = CFG.zones[keeperZone];
            keeper.targetX = kZone.cx;
            keeper.diveDir = keeperZone < 3 ? -1 : keeperZone > 3 ? (keeperZone%3===0?-1:keeperZone%3===2?1:0) : (keeperZone%3===0?-1:keeperZone%3===2?1:0);
            // Simplifikasi: kiper menyelam ke arah zona
            if(kZone.cx < 260) keeper.diveDir = -1;
            else if(kZone.cx > 340) keeper.diveDir = 1;
            else keeper.diveDir = 0;
            keeper.diving = true;
            keeper.diveProgress = 0;
        }

        // Simpan hasil untuk nanti
        ball._result = isGoal ? 'goal' : (isMiss ? 'miss' : 'save');
        ball._endX = endX;
        ball._endY = isMiss ? Math.min(endY, CFG.goalY - 10) : endY;
        ball._frames = 0;

        state = 'SHOOTING';
        totalShots++;
        playSound('kick');
    }

    // ========== UPDATE GAME ==========
    function update() {
        // Power bar
        if(state === 'CHARGING') {
            power += CFG.powerSpeed * powerDir;
            if(power >= CFG.maxPower) { power = CFG.maxPower; powerDir = -1; }
            if(power <= 0) { power = 0; powerDir = 1; }
        }

        // Bola terbang
        if(state === 'SHOOTING') {
            ball._frames++;
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Trail
            trail.push({x:ball.x, y:ball.y});
            if(trail.length > 12) trail.shift();

            // Kiper dive
            if(keeper.diving) {
                keeper.diveProgress = Math.min(1, keeper.diveProgress + 0.06);
                keeper.x = lerp(CFG.keeperBaseX, keeper.targetX, keeper.diveProgress);
            }

            // Cek apakah bola sampai di gawang
            if(ball.y <= CFG.goalY + CFG.goalH * 0.5) {
                resolveShot();
            }
            // Safety: jika bola keluar canvas
            if(ball.y < -20 || ball.x < -20 || ball.x > CFG.canvasW+20) {
                resolveShot();
            }
        }

        // Result timer
        if(state === 'RESULT') {
            resultTimer--;
            ballAlpha = Math.max(0, ballAlpha - 0.03);
            if(resultTimer <= 0) {
                nextRound();
            }
        }

        updateParticles();
    }

    function resolveShot() {
        const result = ball._result;
        resultType = result;

        if(result === 'goal') {
            score++;
            totalGoals++;
            streak++;
            if(streak > bestStreak) bestStreak = streak;
            spawnParticles(ball.x, ball.y, 30, '#ffd740', '#00e676', 4, 50);
            spawnParticles(ball.x, ball.y, 15, '#ffffff', '#69f0ae', 3, 35);
            goalAnim.classList.add('show');
            playSound('goal');
            // Skor bonus streak
            if(streak >= 3) score += 1;
            if(streak >= 6) score += 2;
        } else if(result === 'save') {
            lives--;
            streak = 0;
            spawnParticles(keeper.x, keeper.y, 15, '#ff5252', '#ffc107', 3, 30);
            saveAnim.classList.add('show');
            playSound('save');
        } else {
            // Miss
            lives--;
            streak = 0;
            spawnParticles(ball.x, ball.y, 10, '#ff5252', '#ff8a80', 2, 25);
            playSound('miss');
        }

        state = 'RESULT';
        resultTimer = 80;
        updateHUD();
    }

    function nextRound() {
        goalAnim.classList.remove('show');
        saveAnim.classList.remove('show');

        if(lives <= 0 || round >= CFG.maxRounds) {
            state = 'GAMEOVER';
            showGameOver();
            return;
        }

        round++;
        resetRound();
        state = 'AIMING';
        updateHUD();
    }

    function resetRound() {
        ball.x = CFG.ballStartX;
        ball.y = CFG.ballStartY;
        ball.vx = 0;
        ball.vy = 0;
        ball.scale = 1;
        ballAlpha = 1;
        keeper.x = CFG.keeperBaseX;
        keeper.y = CFG.keeperBaseY;
        keeper.targetX = CFG.keeperBaseX;
        keeper.diving = false;
        keeper.diveProgress = 0;
        keeper.diveDir = 0;
        power = 0;
        powerDir = 1;
        trail = [];
        particles = [];
        aimX = 300;
        aimY = 120;
    }

    // ========== HUD ==========
    function updateHUD() {
        hudScore.textContent = score;
        hudRound.textContent = round + '/' + CFG.maxRounds;
        let heartsStr = '';
        for(let i=0; i<CFG.maxLives; i++) {
            heartsStr += i < lives ? '<i class="fas fa-heart" style="color:var(--danger);margin:0 1px;font-size:0.9rem;"></i>' : '<i class="far fa-heart" style="color:rgba(255,82,82,0.3);margin:0 1px;font-size:0.9rem;"></i>';
        }
        hudLives.innerHTML = heartsStr;

        if(streak >= 2) {
            streakBadge.textContent = 'STREAK x' + streak;
            streakBadge.classList.add('show');
        } else {
            streakBadge.classList.remove('show');
        }
    }

    // ========== GAME OVER ==========
    function showGameOver() {
        const accuracy = totalShots > 0 ? Math.round((totalGoals/totalShots)*100) : 0;
        let rating = 'Pemula';
        if(score >= 15) rating = 'Legenda';
        else if(score >= 12) rating = 'Bintang';
        else if(score >= 9) rating = 'Pro';
        else if(score >= 6) rating = 'Menengah';
        else if(score >= 3) rating = 'Pemula';

        finalStats.innerHTML = `
            <div class="stat-row"><span class="stat-label">Skor Akhir</span><span class="stat-val" style="color:var(--gold);font-size:1.3rem;">${score}</span></div>
            <div class="stat-row"><span class="stat-label">Gol</span><span class="stat-val">${totalGoals} / ${totalShots}</span></div>
            <div class="stat-row"><span class="stat-label">Akurasi</span><span class="stat-val">${accuracy}%</span></div>
            <div class="stat-row"><span class="stat-label">Streak Terbaik</span><span class="stat-val">${bestStreak}</span></div>
            <div class="stat-row"><span class="stat-label">Rating</span><span class="stat-val" style="color:var(--accent);">${rating}</span></div>
        `;
        gameOverOverlay.classList.remove('hidden');
        playSound('whistle');
    }

    // ========== INPUT ==========
    function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = CFG.canvasW / rect.width;
        const scaleY = CFG.canvasH / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    canvas.addEventListener('mousemove', (e) => {
        if(state !== 'AIMING' && state !== 'CHARGING') return;
        const pos = getCanvasPos(e);
        // Batasi aim area ke gawang + sekitarnya
        aimX = clamp(pos.x, CFG.goalX - 30, CFG.goalX + CFG.goalW + 30);
        aimY = clamp(pos.y, CFG.goalY - 30, CFG.goalY + CFG.goalH + 30);
    });

    canvas.addEventListener('mousedown', (e) => {
        if(state !== 'AIMING') return;
        e.preventDefault();
        initAudio();
        state = 'CHARGING';
        power = 0;
        powerDir = 1;
    });

    canvas.addEventListener('mouseup', (e) => {
        if(state !== 'CHARGING') return;
        e.preventDefault();
        shoot();
    });

    canvas.addEventListener('mouseleave', () => {
        if(state === 'CHARGING') {
            shoot();
        }
    });

    // Touch support
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        initAudio();
        if(state === 'AIMING') {
            const pos = getCanvasPos(e);
            aimX = clamp(pos.x, CFG.goalX - 30, CFG.goalX + CFG.goalW + 30);
            aimY = clamp(pos.y, CFG.goalY - 30, CFG.goalY + CFG.goalH + 30);
            state = 'CHARGING';
            power = 0;
            powerDir = 1;
        }
    }, {passive:false});

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if(state !== 'CHARGING') return;
        const pos = getCanvasPos(e);
        aimX = clamp(pos.x, CFG.goalX - 30, CFG.goalX + CFG.goalW + 30);
        aimY = clamp(pos.y, CFG.goalY - 30, CFG.goalY + CFG.goalH + 30);
    }, {passive:false});

    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        if(state === 'CHARGING') shoot();
    }, {passive:false});

    // Tombol menu
    document.getElementById('btnStart').addEventListener('click', () => {
        initAudio();
        playSound('whistle');
        menuOverlay.classList.add('hidden');
        hud.style.opacity = '1';
        startGame();
    });

    document.getElementById('btnRestart').addEventListener('click', () => {
        gameOverOverlay.classList.add('hidden');
        startGame();
    });

    // ========== MULAI GAME ==========
    function startGame() {
        score = 0;
        lives = CFG.maxLives;
        round = 1;
        streak = 0;
        bestStreak = 0;
        totalShots = 0;
        totalGoals = 0;
        resetRound();
        state = 'AIMING';
        updateHUD();
        playSound('whistle');
    }

    // ========== LOOP RENDER ==========
    function gameLoop() {
        update();

        // Clear & render
        ctx.clearRect(0, 0, CFG.canvasW, CFG.canvasH);
        drawField();
        drawGoal();
        drawTrail();
        drawKeeper();
        drawBall();
        drawAimCursor();
        drawPowerBar();
        drawParticles();
        drawRoundInfo();

        // Overlay gelap untuk result
        if(state === 'RESULT') {
            ctx.fillStyle = `rgba(0,0,0,${0.15 * (1 - resultTimer/80)})`;
            ctx.fillRect(0, 0, CFG.canvasW, CFG.canvasH);
        }

        // Animasi menunggu aim - bola kecil floating
        if(state === 'AIMING' || state === 'CHARGING') {
            ball.y = CFG.ballStartY + Math.sin(Date.now()*0.004)*2;
        }

        requestAnimationFrame(gameLoop);
    }

    // ========== Polyfill roundRect ==========
    if(!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
            if(typeof r === 'number') r = {tl:r,tr:r,br:r,bl:r};
            this.moveTo(x+r.tl, y);
            this.lineTo(x+w-r.tr, y);
            this.quadraticCurveTo(x+w, y, x+w, y+r.tr);
            this.lineTo(x+w, y+h-r.br);
            this.quadraticCurveTo(x+w, y+h, x+w-r.br, y+h);
            this.lineTo(x+r.bl, y+h);
            this.quadraticCurveTo(x, y+h, x, y+h-r.bl);
            this.lineTo(x, y+r.tl);
            this.quadraticCurveTo(x, y, x+r.tl, y);
            this.closePath();
        };
    }

    // Mulai loop
    gameLoop();
    </script>
